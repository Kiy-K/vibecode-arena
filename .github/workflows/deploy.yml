name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: 'Deploy Worker'
        type: boolean
        default: true
      deploy_app:
        description: 'Deploy App'
        type: boolean
        default: true

jobs:
  changes:
    runs-on: ubuntu-latest
    # Skip if CI failed (unless manual trigger)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      worker: ${{ steps.filter.outputs.worker }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            worker:
              - 'worker/**'
              - 'wrangler.toml'

  deploy-worker:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_worker || needs.changes.outputs.worker == 'true' }}
    runs-on: ubuntu-latest
    name: Deploy Worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Worker (Durable Objects)
        run: bun run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-app:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_app || github.event_name == 'workflow_run' }}
    runs-on: ubuntu-latest
    name: Deploy App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Deploy Pages (SvelteKit App)
        run: bun run deploy:app
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          E2B_API_KEY: ${{ secrets.E2B_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
