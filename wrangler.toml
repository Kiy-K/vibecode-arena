name = "vibecode-arena"
main = "worker/src/index.ts"
compatibility_date = "2024-12-01"

# Custom domain for the worker API
routes = [
  { pattern = "api.vibecodearena.dev", custom_domain = true }
]

# Durable Objects
[[durable_objects.bindings]]
name = "GAME_ROOMS"
class_name = "GameRoom"

# Migrations for DO storage
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Environment variables (set via wrangler secret or dashboard)
# [vars]
# FRONTEND_URL = "https://vibecodearena.dev"

# For local development
[dev]
port = 8788

# Build config - resolve imports from src/lib
[build]
command = ""

# Alias paths to match SvelteKit's $lib
[alias]
"$lib" = "./src/lib"
